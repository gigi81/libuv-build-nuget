name: Build

on:
  push:
  pull_request:

jobs:

  # ------- Windows arm64 -----------------------------------------------------
  windows_arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Fix CMakeLists.txt
        working-directory: libuv
        shell: pwsh
        run: |
          (Get-Content -path 'CMakeLists.txt' -Raw) | %{ $_.Replace('if(WIN32)', "if(CMAKE_GENERATOR_PLATFORM MATCHES `"ARM|ARM64`")`r`n  list(APPEND uv_test_libraries shell32)`r`nendif()`r`n`r`nif(WIN32)") } | Set-Content -Path 'CMakeLists.txt'

      - name: CMake arm64
        working-directory: libuv
        run: cmake . -G "Visual Studio 17 2022" -A ARM64

      - name: Build arm64
        working-directory: libuv
        run: cmake --build . --config Release

      - uses: actions/upload-artifact@v7
        with:
          name: win-arm64
          path: libuv\release\uv.dll

  # ------- Windows x64 -------------------------------------------------------
  windows_x64:
    runs-on: windows-latest
    outputs:
      packageVersion: ${{ steps.version.outputs.packageVersion }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set version
        id: version
        working-directory: libuv/include/uv
        shell: pwsh
        run: |
          $v = @{}
          $path = Join-Path (Get-Location) 'version.h'
          foreach($line in Get-Content -Path $path)
          {
              $m = [regex]::Match($line, '#define[\t\s]+([1-9a-zA-Z_]+)[\t\s]+(.*)')
              if($m.Success)
              {
                  $v.Add($m.Groups[1].Value, $m.Groups[2].Value.Trim())
              }
          }
          if($v['UV_VERSION_IS_RELEASE'] -ne '1')
          {
              $postfix = '-beta'
          }
          $version = "$($v['UV_VERSION_MAJOR']).$($v['UV_VERSION_MINOR']).$($v['UV_VERSION_PATCH']).$($Env:GITHUB_RUN_NUMBER)$postfix"
          echo "packageVersion=$version" >> $env:GITHUB_OUTPUT
          echo "packageVersion=$version" >> $env:GITHUB_ENV

      - name: CMake x64
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -G "Visual Studio 17 2022" -A x64

      - name: Build x64
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests x64
        working-directory: libuv
        run: release\uv_run_tests.exe

      - uses: actions/upload-artifact@v7
        with:
          name: win-x64
          path: libuv\release\uv.dll

  # ------- Windows x86 -------------------------------------------------------
  windows_x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: CMake x86
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -G "Visual Studio 17 2022" -A Win32

      - name: Build x86
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests x86
        working-directory: libuv
        run: release\uv_run_tests.exe

      - uses: actions/upload-artifact@v7
        with:
          name: win-x86
          path: libuv\release\uv.dll

  # ------- Linux x64 ---------------------------------------------------------
  linux_x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Generate project
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release

      - name: Compile
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: libuv
        run: ./uv_run_tests

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: libuv/libuv.so

  # ------- Linux arm64 (aarch64-linux-gnu) -----------------------------------
  linux_arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install cross-compiler and qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static

      - name: Generate project
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Compile
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests (on qemu)
        working-directory: libuv
        run: |
          set +e
          QEMU_LD_PREFIX=/usr/aarch64-linux-gnu qemu-aarch64-static ./uv_run_tests
          ret=$?
          set -e
          if test $ret -eq 0
          then
            echo "All tests succeeded"
          elif test $ret -le 6
          then
            echo "::warning::$ret tests failed, known issues"
          else
            echo "$ret tests failed"
            exit $ret
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: libuv/libuv.so

  # ------- Linux arm (arm-linux-gnueabihf) -----------------------------------
  linux_arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install cross-compiler and qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf qemu-user-static

      - name: Generate project
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++

      - name: Compile
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests (on qemu)
        working-directory: libuv
        run: |
          set +e
          QEMU_LD_PREFIX=/usr/arm-linux-gnueabihf qemu-arm-static ./uv_run_tests
          ret=$?
          set -e
          if test $ret -eq 0
          then
            echo "All tests succeeded"
          elif test $ret -le 6
          then
            echo "::warning::$ret tests failed, known issues"
          else
            echo "$ret tests failed"
            exit $ret
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm
          path: libuv/libuv.so

  # ------- macOS x64 ---------------------------------------------------------
  osx_x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Generate project
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -G Xcode -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Compile
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: libuv
        run: |
          set +e
          Release/uv_run_tests
          ret=$?
          set -e
          if test $ret -eq 0
          then
            echo "All tests succeeded"
          elif test $ret -le 5
          then
            echo "::warning::$ret tests failed, known issues"
          else
            echo "$ret tests failed"
            exit $ret
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: osx-x64
          path: libuv/Release/libuv.dylib

  # ------- macOS arm64 -------------------------------------------------------
  osx_arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Generate project
        working-directory: libuv
        run: cmake . -DBUILD_TESTING=ON -G Xcode -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Compile
        working-directory: libuv
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: libuv
        run: |
          set +e
          Release/uv_run_tests
          ret=$?
          set -e
          if test $ret -eq 0
          then
            echo "All tests succeeded"
          elif test $ret -le 5
          then
            echo "::warning::$ret tests failed, known issues"
          else
            echo "$ret tests failed"
            exit $ret
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: osx-arm64
          path: libuv/Release/libuv.dylib

  # ------- Package -----------------------------------------------------------
  package:
    runs-on: windows-latest
    permissions:
      packages: write
    needs:
      - windows_arm64
      - windows_x64
      - windows_x86
      - linux_x64
      - linux_arm64
      - linux_arm
      - osx_x64
      - osx_arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/download-artifact@v8
        with:
          path: runtimes

      - name: Rename uv.dll to libuv.dll
        shell: pwsh
        run: Get-ChildItem -Path runtimes -File -Recurse | % { Rename-Item -Path $_.PSPath -NewName $_.Name.replace("uv.dll","libuv.dll") }

      - name: Update change log in nuspec
        shell: pwsh
        run: |
          $first = $false
          $changeLog = ""
          $path = Join-Path (Join-Path (Get-Location) 'libuv') 'ChangeLog'
          $nuspec = Join-Path (Get-Location) 'libuv-shared.nuspec'

          foreach($line in Get-Content -Path $path)
          {
              if($line -match '\d{4}\.\d{2}\.\d{2}.*')
              {
                  if($first) { break; }
                  $first = $true
              }

              if($first -and ![String]::IsNullOrWhiteSpace($line))
              {
                  $changeLog += $line
                  $changeLog += [System.Environment]::NewLine
              }
          }

          [xml]$xml = Get-Content $nuspec
          $xml.package.metadata.releaseNotes = $changeLog
          $xml.Save($nuspec)

      - uses: nuget/setup-nuget@v3

      - name: NuGet pack
        run: nuget pack libuv-shared.nuspec -Version ${{ needs.windows_x64.outputs.packageVersion }}

      - name: NuGet push to GitHub Packages
        run: nuget push *.nupkg -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" -ApiKey "pat${{ secrets.GITHUB_TOKEN }}"

      - name: NuGet push to nuget.org
        if: github.ref == 'refs/heads/main'
        run: nuget push *.nupkg -Source https://api.nuget.org/v3/index.json -ApiKey ${{ secrets.NUGET_API_KEY }}
